<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quản trị Bản đồ tri thức">
    <title>Quản lý Công trình - Knowledge Map Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-user-shield"></i>
                <span class="logo-text">KnowledgeMap Admin</span>
            </div>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-th-large"></i>
                    <span>Tổng quan hệ thống</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="lecturers.html" class="nav-link">
                    <i class="fas fa-user-tie"></i>
                    <span>QL Giảng viên</span>
                </a>
            </li>
            <li class="nav-item active">
                <a href="publications.html" class="nav-link">
                    <i class="fas fa-file-alt"></i>
                    <span>QL Công trình</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="projects.html" class="nav-link">
                    <i class="fas fa-flask"></i>
                    <span>QL Đề tài</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>Về trang chủ</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>Cấu hình</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" onclick="logoutAdmin()" class="nav-link" style="color: var(--accent-red);">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng xuất</span>
                </a>
            </li>
        </ul>
    </nav>

    <main class="main-content" id="mainContent">
        <header class="top-header">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="page-title" id="pageTitle">Quản lý Công trình</h1>
            <div class="header-actions">
                <span style="font-weight: 500; color: var(--text-secondary); margin-right: 15px;">Xin chào, Admin</span>
            </div>
        </header>

        <!-- PUBLICATIONS SECTION -->
        <section class="page active" id="page-admin-publications" style="display: block;">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-file-alt"></i> Quản lý Công trình</h2>
                    <div class="card-actions">
                        <button class="btn btn-primary btn-sm" onclick="openAdminModal('cong-trinh')">
                            <i class="fas fa-plus"></i> Thêm mới
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="data-table" id="adminPublicationsTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tên công trình</th>
                                    <th>Năm XB</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="adminPublicationsBody">
                                <tr><td colspan="4" class="loading-cell">Đang tải...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- ADMIN MODAL FORM -->
        <div class="modal-overlay" id="adminModalOverlay">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="adminModalTitle">Thêm mới</h2>
                    <button class="btn btn-sm" style="background:none;border:none;font-size:20px;" onclick="closeAdminModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="adminForm" class="login-form">
                        <input type="hidden" id="formEntityType">
                        <input type="hidden" id="formEntityId">
                        
                        <div id="formFieldsContainer">
                            <!-- Dynamic fields injected here -->
                        </div>
                        
                        <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                            <button type="button" class="btn" onclick="closeAdminModal()">Hủy</button>
                            <button type="submit" class="btn btn-primary">Lưu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/admin/admin_app.js"></script>
</body>
</html>
