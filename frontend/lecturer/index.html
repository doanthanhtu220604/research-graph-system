<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giảng viên - Knowledge Map</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-chalkboard-teacher"></i>
                <span class="logo-text">Giảng viên</span>
            </div>
        </div>

        <ul class="nav-menu">
            <li class="nav-item active">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-user-circle"></i>
                    <span>Tài khoản của tôi</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="publications.html" class="nav-link">
                    <i class="fas fa-file-alt"></i>
                    <span>Công trình của tôi</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="projects.html" class="nav-link">
                    <i class="fas fa-flask"></i>
                    <span>Đề tài của tôi</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="/" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>Về trang chủ</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" onclick="logoutUser()" class="nav-link" style="color: var(--accent-red);">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng xuất</span>
                </a>
            </li>
        </ul>
    </nav>

    <main class="main-content" id="mainContent">
        <header class="top-header">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="page-title" id="pageTitle">Thông tin Giảng viên</h1>
            <div class="header-actions">
                <span style="font-weight: 500; color: var(--text-secondary); margin-right: 15px;" id="welcomeText">Xin chào, Giảng viên</span>
            </div>
        </header>

        <section class="page active" id="page-lecturer-overview">
            <div class="stats-grid" id="lecturerStatsGrid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: var(--gradient-primary);"><i class="fas fa-file-alt"></i></div>
                    <div class="stat-info">
                        <h3 class="stat-number" id="countPublications">0</h3>
                        <p class="stat-label">Công trình nghiên cứu</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: var(--gradient-orange);"><i class="fas fa-flask"></i></div>
                    <div class="stat-info">
                        <h3 class="stat-number" id="countProjects">0</h3>
                        <p class="stat-label">Đề tài tham gia</p>
                    </div>
                </div>
            </div>
            
            <div class="card" style="margin-top: 20px;">
                <div class="card-header">
                    <h2><i class="fas fa-id-card"></i> Chi tiết tài khoản</h2>
                </div>
                <div class="card-body">
                    <div style="display: flex; gap: 30px; align-items: flex-start;">
                        <img id="lecturerAvatar" src="" alt="Avatar" style="width: 120px; height: 120px; border-radius: 60px; object-fit: cover; background: #f1f2f6;">
                        <div>
                            <h3 id="lecturerName" style="font-size: 24px; margin-bottom: 10px; color: var(--text-primary);">Đang tải...</h3>
                            <p style="margin-bottom: 8px;"><strong>Bộ môn:</strong> <span id="lecturerDept">...</span></p>
                            <p style="margin-bottom: 8px;"><strong>Email:</strong> <span id="lecturerEmail">...</span></p>
                            <p style="margin-bottom: 8px;"><strong>Học vị:</strong> <span id="lecturerDegree">...</span></p>
                            <p style="margin-bottom: 8px;"><strong>Chức danh:</strong> <span id="lecturerTitle">...</span></p>
                            <p style="margin-bottom: 8px;"><strong>Lĩnh vực:</strong> <span id="lecturerFields">...</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/lecturer/lecturer_app.js"></script>
</body>
</html>
