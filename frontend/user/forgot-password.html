<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Knowledge Map</title>
    <meta name="description" content="Khôi phục mật khẩu tài khoản Knowledge Map - Khoa CNTT ĐH Nha Trang">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        body {
            background-color: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image:
                radial-gradient(circle at 15% 25%, rgba(79, 142, 247, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 85% 75%, rgba(16, 185, 129, 0.06) 0%, transparent 30%);
        }

        .card-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            animation: slideUpFade 0.45s ease;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-icon {
            width: 72px; height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, #4F8EF7, #3b82f6);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white;
            margin: 0 auto 20px;
            box-shadow: 0 6px 20px rgba(79,142,247,0.3);
        }

        h1 {
            text-align: center;
            font-size: 22px;
            color: var(--text-primary);
            margin: 0 0 6px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%; box-sizing: border-box;
            padding: 12px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-body);
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4F8EF7;
            box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #4F8EF7, #3b82f6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-submit:hover:not(:disabled) {
            filter: brightness(1.08);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(79,142,247,0.3);
        }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .msg-box {
            display: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
            text-align: center;
        }
        .msg-box.error   { background: rgba(239,68,68,0.08); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .msg-box.success { background: rgba(16,185,129,0.08); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 22px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #4F8EF7; }

        /* Success state */
        .success-state { display: none; text-align: center; }
        .success-icon {
            font-size: 52px; color: #10b981;
            margin-bottom: 16px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        .success-state h2 { font-size: 20px; color: var(--text-primary); margin-bottom: 10px; }
        .success-state p  { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
        .success-state .email-highlight {
            font-weight: 600; color: #4F8EF7;
        }
    </style>
</head>
<body>

<div class="card-wrap">

    <!-- Form state -->
    <div id="formState">
        <div class="card-icon"><i class="fas fa-key"></i></div>
        <h1>Quên mật khẩu?</h1>
        <p class="subtitle">Nhập địa chỉ email đã đăng ký. Chúng tôi sẽ gửi link đặt lại mật khẩu cho bạn.</p>

        <div class="msg-box" id="msgBox"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="emailInput"><i class="fas fa-envelope" style="margin-right:6px; color:#4F8EF7;"></i>Địa chỉ Email</label>
                <input type="email" id="emailInput" placeholder="vd: gv_nguyenvan@ntu.edu.vn" required autocomplete="email">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="fas fa-paper-plane"></i>
                <span>Gửi link khôi phục</span>
            </button>
        </form>

        <a href="login.html" class="back-link">
            <i class="fas fa-arrow-left" style="margin-right:5px;"></i>Quay lại đăng nhập
        </a>
    </div>

    <!-- Success state -->
    <div class="success-state" id="successState">
        <div class="success-icon"><i class="fas fa-envelope-circle-check"></i></div>
        <h2>Kiểm tra hộp thư!</h2>
        <p>
            Chúng tôi đã gửi link đặt lại mật khẩu tới<br>
            <span class="email-highlight" id="sentEmailLabel"></span>
        </p>
        <p style="margin-top: 14px;">
            Link sẽ hết hạn sau <strong>15 phút</strong>. Kiểm tra cả thư mục <strong>Spam</strong> nếu không thấy.
        </p>
        <a href="login.html" class="back-link" style="margin-top: 24px;">
            <i class="fas fa-sign-in-alt" style="margin-right:5px;"></i>Quay lại đăng nhập
        </a>
    </div>

</div>

<script>
    const form = document.getElementById('forgotForm');
    const emailInput = document.getElementById('emailInput');
    const submitBtn = document.getElementById('submitBtn');
    const msgBox = document.getElementById('msgBox');

    function showMsg(type, text) {
        msgBox.className = `msg-box ${type}`;
        msgBox.innerHTML = text;
        msgBox.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = emailInput.value.trim();
        if (!email) return;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Đang gửi...</span>';
        msgBox.style.display = 'none';

        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();

            if (data.status === 'ok') {
                // Hiển thị màn hình thành công
                document.getElementById('formState').style.display = 'none';
                document.getElementById('sentEmailLabel').textContent = email;
                document.getElementById('successState').style.display = 'block';
            } else {
                showMsg('error', `<i class="fas fa-exclamation-circle" style="margin-right:6px;"></i>${data.message || 'Đã có lỗi xảy ra. Vui lòng thử lại.'}`);
            }
        } catch (err) {
            showMsg('error', '<i class="fas fa-wifi" style="margin-right:6px;"></i>Lỗi kết nối máy chủ. Vui lòng thử lại sau.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i><span>Gửi link khôi phục</span>';
        }
    });
</script>

</body>
</html>
