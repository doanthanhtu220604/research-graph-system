<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bản đồ tri thức nghiên cứu khoa học - Khoa CNTT, Trường Đại học Nha Trang">
    <title>Đề tài - Knowledge Map | ĐH Nha Trang</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-content" id="mainContent">
        <div class="page-header">
            <h1 class="page-title">Đề tài Nghiên cứu</h1>
        </div>

        <section class="page active" id="page-projects" style="display: block;">
            <div class="card">
                <div class="data-toolbar">
                    <div class="toolbar-search">
                        <i class="fas fa-search"></i>
                        <input type="text" id="projSearchInput" placeholder="Tìm tên đề tài..." oninput="filterUserProjects()">
                    </div>
                    <select class="toolbar-select" id="projLevelFilter" onchange="filterUserProjects()">
                        <option value="">Tất cả cấp</option>
                        <option value="Cấp Nhà nước">Cấp Nhà nước</option>
                        <option value="Cấp Bộ">Cấp Bộ</option>
                        <option value="Cấp Tỉnh/Thành phố">Cấp Tỉnh/TP</option>
                        <option value="Cấp Trường">Cấp Trường</option>
                        <option value="Đề tài Doanh nghiệp">Đề tài DN</option>
                    </select>
                    <span class="toolbar-count" id="projCount"></span>
                </div>
                <div id="projectsList" class="data-row-list">
                    <div class="list-loading">
                        <i class="fas fa-spinner fa-spin fa-2x"></i>
                        <span>Đang tải đề tài nghiên cứu...</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-placeholder"></div>

    <script src="../js/user/layout.js"></script>
    <script src="../js/user/config.js"></script>
    <script src="../js/user/graph.js"></script>
    <script src="../js/user/scholar.js"></script>
    <script src="../js/user/translation.js"></script>
    <script src="../js/user/auth.js"></script>
    <script src="../js/user/dashboard.js"></script>
    <script src="../js/user/explore.js"></script>
    <script src="../js/user/lecturers.js"></script>
    <script src="../js/user/publications.js"></script>
    <script src="../js/user/projects.js"></script>
    <script src="../js/user/statistics.js"></script>
    <script src="../js/user/main.js"></script>
</body>
</html>
