<!-- Full-page detail overlay matching the mockup -->
<div class="detail-overlay" id="globalDetailOverlay">
    <div class="detail-header-action">
        <button class="btn-back" onclick="closeEntityDetail()">
            <i class="fas fa-arrow-left"></i> Quay lại danh sách
        </button>
    </div>

    <div class="detail-grid">
        <!-- Left Column: Info -->
        <div class="detail-info-card">
            <!-- Info header (Title + Icon) -->
            <div style="display: flex; gap: 16px; margin-bottom: 24px; align-items: flex-start;">
                <div id="detailIcon" style="width: 64px; height: 64px; border-radius: 50%; background: rgba(245, 158, 11, 0.1); color: var(--accent-orange); display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; flex-shrink: 0;">
                    <i class="fas fa-calendar-alt"></i>
                </div>
                <div>
                    <h1 id="detailTitle" style="font-size: 28px; font-weight: 700; margin-bottom: 4px; line-height: 1.2;">Title goes here</h1>
                    <span id="detailSubtitle" style="color: var(--text-secondary); font-size: 14px;">Subtitle</span>
                </div>
            </div>

            <!-- Two col details grid inside card -->
            <div id="detailFieldsGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: rgba(0,0,0,0.02); padding: 20px; border-radius: var(--radius-sm);">
                <!-- Fields injected here dynamically -->
            </div>

            <!-- Description or Lists -->
            <div id="detailBodyContent" style="margin-top: 20px;">
            </div>
        </div>

        <!-- Right Column: Graph -->
        <div class="detail-graph-card card" style="position: relative;">
            <div class="card-header">
                <h2><i class="fas fa-project-diagram"></i> Knowledge Graph - Đồ thị</h2>
                <div class="card-actions">
                    <button class="btn btn-sm" onclick="resetDetailGraphView()">
                        <i class="fas fa-expand"></i> Reset
                    </button>
                </div>
            </div>
            <div id="detailGraphLegend" class="graph-legend" style="position: absolute; top: 75px; left: 15px; z-index: 10; background: rgba(255, 255, 255, 0.95); border: 1px solid var(--border-color) !important; border-radius: var(--radius-sm); padding: 10px 15px; gap: 6px; flex-direction: column; max-height: 80%; overflow-y: auto; box-shadow: var(--shadow);"></div>
            <div id="detail-graph-container" class="detail-graph-container">
                <!-- Vis.js network will be rendered here -->
            </div>
        </div>
    </div>
</div>
