<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
    <div class="modal" style="max-width: 400px;">
        <div class="modal-header">
            <h2><i class="fas fa-user-shield"></i> Đăng nhập Quản trị</h2>
            <button class="modal-close" onclick="closeLoginModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                </div>
                <div id="loginError" style="display:none; color: red;">Sai tên đăng nhập hoặc mật khẩu!</div>
                <button type="submit" class="btn btn-primary" style="margin-top: 10px; width: 100%; justify-content: center;">Đăng nhập</button>
            </form>
        </div>
    </div>
</div>
