<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bản đồ tri thức nghiên cứu khoa học - Khoa CNTT, Trường Đại học Nha Trang">
    <title>Thống kê - Knowledge Map | ĐH Nha Trang</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-content" id="mainContent">
        <div class="page-header">
            <h1 class="page-title">Thống kê hệ thống</h1>
        </div>

        <section class="page active" id="page-statistics" style="display: block;">
            <div class="stats-detail-grid">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-trophy"></i> Giảng viên có nhiều công trình nhất</h2>
                    </div>
                    <div class="card-body" id="statsTopLecturers">
                        <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Đang tải...</div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-info-circle"></i> Tổng quan hệ thống</h2>
                    </div>
                    <div class="card-body" id="statsOverview">
                        <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Đang tải...</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-placeholder"></div>

    <script src="../js/layout.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
