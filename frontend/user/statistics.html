<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thống kê tổng quan hệ thống nghiên cứu khoa học - Khoa CNTT, Trường Đại học Nha Trang">
    <title>Thống kê - Knowledge Map | ĐH Nha Trang</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

    <style>
        /* ─── Statistics Page Styles ─── */
        .stats-hero {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px 22px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 16px 16px 0 0;
        }

        .stat-card.blue::before  { background: linear-gradient(90deg, #4F8EF7, #6ea8ff); }
        .stat-card.green::before { background: linear-gradient(90deg, #10b981, #34d399); }
        .stat-card.orange::before{ background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .stat-card.purple::before{ background: linear-gradient(90deg, #8b5cf6, #a78bfa); }

        .stat-card-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 14px;
        }

        .stat-card.blue   .stat-card-icon { background: rgba(79, 142, 247, 0.12); color: #4F8EF7; }
        .stat-card.green  .stat-card-icon { background: rgba(16, 185, 129, 0.12); color: #10b981; }
        .stat-card.orange .stat-card-icon { background: rgba(245, 158, 11, 0.12);  color: #f59e0b; }
        .stat-card.purple .stat-card-icon { background: rgba(139, 92, 246, 0.12); color: #8b5cf6; }

        .stat-card-value {
            font-size: 38px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -1px;
            margin-bottom: 6px;
        }

        .stat-card.blue   .stat-card-value { color: #4F8EF7; }
        .stat-card.green  .stat-card-value { color: #10b981; }
        .stat-card.orange .stat-card-value { color: #f59e0b; }
        .stat-card.purple .stat-card-value { color: #8b5cf6; }

        .stat-card-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .stat-card-bg-icon {
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 80px;
            opacity: 0.04;
            pointer-events: none;
        }

        /* ─── Charts Row ─── */
        .charts-row {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .chart-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .chart-card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-card-title i {
            font-size: 14px;
        }

        .chart-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(79, 142, 247, 0.1);
            color: #4F8EF7;
        }

        .chart-canvas-wrap {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        /* ─── Top Lecturers Leaderboard ─── */
        .top-lecturers-section {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i { color: #f59e0b; }

        .podium-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .podium-card {
            border-radius: 14px;
            padding: 20px 16px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid transparent;
        }

        .podium-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .podium-card.rank-1 {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.08), rgba(255, 193, 7, 0.04));
            border-color: rgba(255, 193, 7, 0.3);
        }
        .podium-card.rank-2 {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.08), rgba(192, 192, 192, 0.04));
            border-color: rgba(192, 192, 192, 0.3);
        }
        .podium-card.rank-3 {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.08), rgba(205, 127, 50, 0.04));
            border-color: rgba(205, 127, 50, 0.3);
        }

        .podium-medal { font-size: 28px; margin-bottom: 6px; }
        .rank-1 .podium-medal { color: #FFD700; filter: drop-shadow(0 2px 6px rgba(255, 215, 0, 0.4)); }
        .rank-2 .podium-medal { color: #C0C0C0; filter: drop-shadow(0 2px 4px rgba(192, 192, 192, 0.4)); }
        .rank-3 .podium-medal { color: #CD7F32; filter: drop-shadow(0 2px 4px rgba(205, 127, 50, 0.4)); }

        .podium-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 36px;
        }

        .podium-count {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-primary);
            margin: 6px 0 2px;
        }

        .podium-count-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .rank-list { display: flex; flex-direction: column; gap: 4px; }

        .rank-list-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .rank-list-item:hover { background: rgba(0,0,0,0.03); }

        .rank-num {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            background: rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .rank-info { flex: 1; min-width: 0; }
        .rank-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rank-bar-wrap {
            flex-shrink: 0;
            width: 120px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rank-bar {
            flex: 1;
            height: 6px;
            background: rgba(0,0,0,0.07);
            border-radius: 3px;
            overflow: hidden;
        }
        .rank-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #4F8EF7, #6ea8ff);
        }

        .rank-count-badge {
            font-size: 12px;
            font-weight: 700;
            color: #4F8EF7;
            white-space: nowrap;
        }

        @media (max-width: 900px) {
            .stats-hero { grid-template-columns: repeat(2, 1fr); }
            .charts-row { grid-template-columns: 1fr; }
            .podium-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 600px) {
            .stats-hero { grid-template-columns: repeat(2, 1fr); }
            .podium-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-content" id="mainContent">
        <div class="page-header">
            <h1 class="page-title">Thống kê hệ thống</h1>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Tổng quan về hoạt động nghiên cứu khoa học của Khoa CNTT</p>
        </div>

        <section class="page active" id="page-statistics" style="display: block;">

            <!-- ─── 4 Stat Cards ─── -->
            <div class="stats-hero">
                <div class="stat-card blue">
                    <div class="stat-card-icon"><i class="fas fa-chalkboard-teacher"></i></div>
                    <div class="stat-card-value" id="statCountGV">—</div>
                    <div class="stat-card-label">Tổng Giảng viên</div>
                    <div class="stat-card-bg-icon"><i class="fas fa-user-tie"></i></div>
                </div>
                <div class="stat-card green">
                    <div class="stat-card-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="stat-card-value" id="statCountCT">—</div>
                    <div class="stat-card-label">Công trình nghiên cứu</div>
                    <div class="stat-card-bg-icon"><i class="fas fa-file-alt"></i></div>
                </div>
                <div class="stat-card orange">
                    <div class="stat-card-icon"><i class="fas fa-flask"></i></div>
                    <div class="stat-card-value" id="statCountDT">—</div>
                    <div class="stat-card-label">Đề tài nghiên cứu</div>
                    <div class="stat-card-bg-icon"><i class="fas fa-flask"></i></div>
                </div>
                <div class="stat-card purple">
                    <div class="stat-card-icon"><i class="fas fa-sitemap"></i></div>
                    <div class="stat-card-value" id="statCountBM">—</div>
                    <div class="stat-card-label">Bộ môn</div>
                    <div class="stat-card-bg-icon"><i class="fas fa-sitemap"></i></div>
                </div>
            </div>

            <!-- ─── 2 Charts ─── -->
            <div class="charts-row">
                <div class="chart-card">
                    <div class="chart-card-header">
                        <div class="chart-card-title">
                            <i class="fas fa-chart-bar" style="color: #4F8EF7;"></i>
                            Công trình nghiên cứu theo năm
                        </div>
                        <span class="chart-badge">Xu hướng</span>
                    </div>
                    <div class="chart-canvas-wrap" style="height: 240px;">
                        <canvas id="chartPublicationsByYear"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-card-header">
                        <div class="chart-card-title">
                            <i class="fas fa-chart-pie" style="color: #f59e0b;"></i>
                            Phân loại đề tài
                        </div>
                        <span class="chart-badge" style="background: rgba(245,158,11,0.1); color: #f59e0b;">Cơ cấu</span>
                    </div>
                    <div class="chart-canvas-wrap" style="height: 240px;">
                        <canvas id="chartProjectsByLevel"></canvas>
                    </div>
                </div>
            </div>

            <!-- ─── Top Lecturers Leaderboard ─── -->
            <div class="top-lecturers-section">
                <div class="section-header">
                    <div class="section-title">
                        <i class="fas fa-trophy"></i>
                        Top Giảng viên có nhiều công trình nhất
                    </div>
                </div>
                <!-- Podium Top 3 -->
                <div class="podium-grid" id="statsPodium">
                    <div style="text-align:center; color: var(--text-muted); padding: 20px; grid-column: 1/-1;">
                        <i class="fas fa-spinner fa-spin"></i> Đang tải...
                    </div>
                </div>
                <!-- Rank list 4-10 -->
                <div class="rank-list" id="statsRankList"></div>
            </div>

        </section>
    </main>

    <div id="modal-placeholder"></div>

    <script src="../js/user/layout.js"></script>
    <script src="../js/user/app.js"></script>
</body>
</html>
