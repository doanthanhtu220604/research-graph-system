<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký giảng viên - Knowledge Map</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background-color: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 20%, rgba(52, 152, 219, 0.05) 0%, transparent 20%),
                              radial-gradient(circle at 90% 80%, rgba(46, 204, 113, 0.05) 0%, transparent 20%);
        }
        
        .register-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 35px;
            width: 100%;
            max-width: 850px;
            box-shadow: var(--shadow-md);
            animation: slideUpFade 0.5s ease;
        }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .register-header i {
            font-size: 40px;
            color: var(--accent-blue);
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent-blue), #2980b9);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .register-header h1 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        
        .register-header p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .reminder-box {
            background: rgba(231, 76, 60, 0.08);
            border-left: 4px solid var(--accent-red);
            color: var(--accent-red);
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .reminder-box i {
            font-size: 16px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
            margin-bottom: 25px;
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .form-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .form-section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .form-group.required label::after {
            content: " *";
            color: var(--accent-red);
            font-weight: bold;
        }
        
        .form-group label {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 13px;
        }
        
        .form-group input, .form-group select {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-body);
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        
        .btn-register {
            width: 100%;
            padding: 12px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .btn-register:hover {
            background: #2980b9;
            transform: translateY(-1px);
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--accent-blue);
        }
        
        .message-box {
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-weight: 500;
        }
        
        .message-box.error {
            background: rgba(231, 76, 60, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(231, 76, 60, 0.2);
        }
        
        .message-box.success {
            background: rgba(46, 204, 113, 0.1);
            color: #27ae60;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-header">
            <i class="fas fa-user-plus"></i>
            <h1>Đăng ký tài khoản</h1>
            <p>Bản đồ tri thức Khoa CNTT</p>
        </div>

        <div class="reminder-box">
            <i class="fas fa-exclamation-triangle"></i>
            <span>Lưu ý quan trọng: Chỉ giảng viên thuộc Khoa mới được phép đăng ký tài khoản trên hệ thống.</span>
        </div>

        <div class="message-box" id="messageBox"></div>

        <form id="registerForm">
            <div class="form-grid">
                
                <!-- CỘT 1: THÔNG TIN TÀI KHOẢN -->
                <div class="form-column">
                    <div class="form-section-title">
                        <i class="fas fa-key"></i>
                        <span>Thông tin đăng nhập</span>
                    </div>
                    

                    
                    <div class="form-group required">
                        <label for="email">Email (Tên đăng nhập)</label>
                        <input type="email" id="email" placeholder="Nhập địa chỉ email giảng viên" required autocomplete="email">
                    </div>
                    
                    <div class="form-group required">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)" required autocomplete="new-password">
                    </div>
                    
                    <div class="form-group required">
                        <label for="confirmPassword">Nhập lại mật khẩu</label>
                        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required autocomplete="new-password">
                    </div>

                    <!-- THÊM CÁC TRƯỜNG PHỤ CỦA GIẢNG VIÊN Ở CỘT NÀY CHO CÂN BẰNG -->
                    <div class="form-section-title" style="margin-top: 15px;">
                        <i class="fas fa-id-card"></i>
                        <span>Thông tin phụ</span>
                    </div>

                    <div class="form-group">
                        <label for="hoc_vi">Học vị</label>
                        <select id="hoc_vi">
                            <option value="">-- Chọn Học vị --</option>
                            <option value="Cử nhân">Cử nhân</option>
                            <option value="Kỹ sư">Kỹ sư</option>
                            <option value="Thạc sĩ">Thạc sĩ</option>
                            <option value="Tiến sĩ">Tiến sĩ</option>
                            <option value="Phó Giáo sư">Phó Giáo sư</option>
                            <option value="Giáo sư">Giáo sư</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="chuc_danh">Chức danh</label>
                        <input type="text" id="chuc_danh" placeholder="Ví dụ: Giảng viên, Giảng viên chính">
                    </div>

                    <div class="form-group">
                        <label for="chuc_vu">Chức vụ</label>
                        <input type="text" id="chuc_vu" placeholder="Ví dụ: Trưởng bộ môn, Phó trưởng khoa">
                    </div>
                </div>
                
                <!-- CỘT 2: THÔNG TIN GIẢNG VIÊN -->
                <div class="form-column">
                    <div class="form-section-title">
                        <i class="fas fa-user-tie"></i>
                        <span>Thông tin Giảng viên</span>
                    </div>
                    
                    <div class="form-group required">
                        <label for="ma_gv">Mã giảng viên</label>
                        <input type="text" id="ma_gv" placeholder="Nhập mã số giảng viên (ví dụ: 102)" required>
                    </div>
                    
                    <div class="form-group required">
                        <label for="ho_va_ten">Họ và tên</label>
                        <input type="text" id="ho_va_ten" placeholder="Nhập họ và tên giảng viên" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="dien_thoai">Điện thoại</label>
                        <input type="text" id="dien_thoai" placeholder="Nhập số điện thoại">
                    </div>

                    <div class="form-group">
                        <label for="bo_mon">Bộ môn</label>
                        <select id="bo_mon">
                            <option value="">-- Chọn Bộ môn --</option>
                            <!-- Sẽ được tải động từ API -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="chuyen_nganh">Chuyên ngành</label>
                        <input type="text" id="chuyen_nganh" placeholder="Ví dụ: Khoa học máy tính">
                    </div>

                    <div class="form-group">
                        <label for="avatar_file">Ảnh đại diện</label>
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <input type="file" id="avatar_file" accept="image/*" style="flex: 1;">
                            <div id="avatar_preview_container" style="display: none; width: 45px; height: 45px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent-blue); flex-shrink: 0;">
                                <img id="avatar_preview" src="" alt="Avatar Preview" style="width: 100%; height: 100%; object-fit: cover;">
                            </div>
                        </div>
                        <input type="hidden" id="anh_dai_dien" value="">
                    </div>
                </div>

            </div>

            <button type="submit" class="btn-register" id="submitBtn">
                <i class="fas fa-user-plus"></i>
                <span>Đăng ký ngay</span>
            </button>
        </form>

        <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại trang đăng nhập</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Tải danh sách Bộ môn khi load trang
            const boMonSelect = document.getElementById('bo_mon');
            try {
                const response = await fetch('/api/admin/bo-mon');
                const result = await response.json();
                if (result.status === 'ok' && result.data) {
                    result.data.forEach(bm => {
                        const opt = document.createElement('option');
                        opt.value = bm.ten_bo_mon;
                        opt.textContent = bm.ten_bo_mon;
                        boMonSelect.appendChild(opt);
                    });
                }
            } catch (err) {
                console.error('Không thể tải danh sách bộ môn:', err);
            }

            // Xử lý sự kiện tải ảnh đại diện lên
            const avatarFileInput = document.getElementById('avatar_file');
            if (avatarFileInput) {
                avatarFileInput.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    const messageBox = document.getElementById('messageBox');
                    messageBox.style.display = 'none';
                    messageBox.className = 'message-box';

                    const formData = new FormData();
                    formData.append('file', file);

                    try {
                        const response = await fetch('/api/upload/image', {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();

                        if (data.status === 'success') {
                            document.getElementById('anh_dai_dien').value = data.url;
                            
                            // Hiển thị ảnh xem trước
                            const previewImg = document.getElementById('avatar_preview');
                            const previewContainer = document.getElementById('avatar_preview_container');
                            previewImg.src = data.url;
                            previewContainer.style.display = 'block';
                        } else {
                            messageBox.textContent = data.message || 'Tải ảnh lên thất bại!';
                            messageBox.classList.add('error');
                            messageBox.style.display = 'block';
                        }
                    } catch (err) {
                        messageBox.textContent = 'Lỗi kết nối khi tải ảnh đại diện!';
                        messageBox.classList.add('error');
                        messageBox.style.display = 'block';
                    }
                });
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const messageBox = document.getElementById('messageBox');
            const submitBtn = document.getElementById('submitBtn');
            
            // Lấy dữ liệu form
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            
            const ma_gv = document.getElementById('ma_gv').value.trim();
            const ho_va_ten = document.getElementById('ho_va_ten').value.trim();
            const email = document.getElementById('email').value.trim();
            const dien_thoai = document.getElementById('dien_thoai').value.trim();
            const hoc_vi = document.getElementById('hoc_vi').value;
            const chuc_danh = document.getElementById('chuc_danh').value.trim();
            const chuc_vu = document.getElementById('chuc_vu').value.trim();
            const bo_mon = document.getElementById('bo_mon').value;
            const chuyen_nganh = document.getElementById('chuyen_nganh').value.trim();
            const anh_dai_dien = document.getElementById('anh_dai_dien').value.trim();

            // Ẩn message box
            messageBox.style.display = 'none';
            messageBox.className = 'message-box';

            // Kiểm tra mật khẩu khớp nhau
            if (password !== confirmPassword) {
                messageBox.textContent = 'Mật khẩu nhập lại không khớp!';
                messageBox.classList.add('error');
                messageBox.style.display = 'block';
                return;
            }

            // Kiểm tra độ dài mật khẩu
            if (password.length < 6) {
                messageBox.textContent = 'Mật khẩu phải từ 6 ký tự trở lên!';
                messageBox.classList.add('error');
                messageBox.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý đăng ký...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        password,
                        ma_gv,
                        ho_va_ten,
                        email,
                        dien_thoai,
                        hoc_vi,
                        chuc_danh,
                        chuc_vu,
                        bo_mon,
                        chuyen_nganh,
                        anh_dai_dien
                    })
                });

                const result = await response.json();

                if (result.status === 'ok') {
                    messageBox.textContent = result.message;
                    messageBox.classList.add('success');
                    messageBox.style.display = 'block';
                    
                    // Reset form
                    document.getElementById('registerForm').reset();
                    
                    // Chuyển hướng về login sau 2 giây
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2500);
                } else {
                    messageBox.textContent = result.message || 'Đăng ký không thành công!';
                    messageBox.classList.add('error');
                    messageBox.style.display = 'block';
                }
            } catch (err) {
                messageBox.textContent = 'Lỗi kết nối máy chủ, vui lòng thử lại sau!';
                messageBox.classList.add('error');
                messageBox.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> <span>Đăng ký ngay</span>';
            }
        });
    </script>
</body>
</html>
