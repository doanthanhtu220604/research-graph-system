<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bản đồ tri thức nghiên cứu khoa học - Khoa CNTT, Trường Đại học Nha Trang">
    <title>Tổng quan - Knowledge Map | ĐH Nha Trang</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-content" id="mainContent">
        <div class="page-header">
            <h1 class="page-title">Tổng quan hệ thống</h1>
        </div>

        <section class="page active" id="page-dashboard" style="display: block;">
            <div class="stats-grid">
                <div class="stat-card" id="stat-gv">
                    <div class="stat-icon"><i class="fas fa-user-tie"></i></div>
                    <div class="stat-info">
                        <h3 class="stat-number" data-target="0">0</h3>
                        <p class="stat-label">Giảng viên</p>
                    </div>
                </div>
                <div class="stat-card" id="stat-ct">
                    <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="stat-info">
                        <h3 class="stat-number" data-target="0">0</h3>
                        <p class="stat-label">Công trình</p>
                    </div>
                </div>
                <div class="stat-card" id="stat-dt">
                    <div class="stat-icon"><i class="fas fa-flask"></i></div>
                    <div class="stat-info">
                        <h3 class="stat-number" data-target="0">0</h3>
                        <p class="stat-label">Đề tài</p>
                    </div>
                </div>
                <div class="stat-card" id="stat-bm">
                    <div class="stat-icon"><i class="fas fa-building"></i></div>
                    <div class="stat-info">
                        <h3 class="stat-number" data-target="0">0</h3>
                        <p class="stat-label">Bộ môn</p>
                    </div>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card graph-card">
                    <div class="card-header">
                        <h2><i class="fas fa-project-diagram"></i> Bản đồ tri thức</h2>
                        <div class="card-actions">
                            <button class="btn btn-sm" onclick="resetGraphView()">
                                <i class="fas fa-expand"></i> Reset
                            </button>
                        </div>
                    </div>
                    <div id="knowledge-graph" class="graph-container"></div>
                    <div class="graph-legend" id="graphLegend"></div>
                </div>

                <div class="card top-lecturers-card">
                    <div class="card-header">
                        <h2><i class="fas fa-trophy"></i> Top Giảng viên</h2>
                    </div>
                    <div class="card-body" id="topLecturersList">
                        <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Đang tải...</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-placeholder"></div>

    <script src="../js/layout.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
