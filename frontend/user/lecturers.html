<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bản đồ tri thức nghiên cứu khoa học - Khoa CNTT, Trường Đại học Nha Trang">
    <title>Giảng viên - Knowledge Map | ĐH Nha Trang</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-content" id="mainContent">
        <div class="page-header">
            <h1 class="page-title">Danh sách Giảng viên</h1>
        </div>

        <section class="page active" id="page-lecturers" style="display: block;">
            <div class="card">
                <div class="data-toolbar">
                    <div class="toolbar-search">
                        <i class="fas fa-search"></i>
                        <input type="text" id="lecturerSearchInput" placeholder="Tìm tên giảng viên..." oninput="filterUserLecturers()">
                    </div>
                    <select class="toolbar-select" id="lecturerDeptFilter" onchange="filterUserLecturers()">
                        <option value="">Tất cả bộ môn</option>
                        <option value="Bộ môn Công nghệ phần mềm">Công nghệ phần mềm</option>
                        <option value="Bộ môn Hệ thống thông tin">Hệ thống thông tin</option>
                        <option value="Bộ môn Mạng máy tính và truyền thông">Mạng máy tính & TT</option>
                    </select>
                    <select class="toolbar-select" id="lecturerDegreeFilter" onchange="filterUserLecturers()">
                        <option value="">Tất cả học vị</option>
                        <option value="Tiến sĩ">Tiến sĩ</option>
                        <option value="Thạc sĩ">Thạc sĩ</option>
                        <option value="Phó Giáo sư">Phó Giáo sư</option>
                        <option value="Giáo sư">Giáo sư</option>
                    </select>
                    <span class="toolbar-count" id="lecturerCount"></span>
                </div>
                <div id="lecturersGrid" class="profile-card-grid">
                    <div class="list-loading" style="grid-column: 1/-1;">
                        <i class="fas fa-spinner fa-spin fa-2x"></i>
                        <span>Đang tải danh sách giảng viên...</span>
                    </div>
                </div>
                <div id="lecturersPagination" class="pagination-container"></div>
            </div>
        </section>
    </main>

    <div id="modal-placeholder"></div>

    <script src="../js/user/layout.js"></script>
    <script src="../js/user/app.js"></script>
</body>
</html>
