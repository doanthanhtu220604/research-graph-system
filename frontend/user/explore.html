<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bản đồ tri thức nghiên cứu khoa học - Khoa CNTT, Trường Đại học Nha Trang">
    <title>Khám phá - Knowledge Map | ĐH Nha Trang</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-content" id="mainContent">
        <div class="page-header">
            <h1 class="page-title">Khám phá Bản đồ</h1>
        </div>

        <section class="page active" id="page-explore" style="display: block;">
            <div class="explore-header">
                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="exploreSearch" placeholder="Nhập tên giảng viên, từ khóa công trình, lĩnh vực..." autocomplete="off">
                        <button class="btn btn-primary" onclick="performSearch()">Tìm kiếm</button>
                    </div>
                    <div id="exploreSuggestions" class="suggestions-dropdown"></div>
                </div>

                <div class="search-filters">
                    <button class="filter-btn active" onclick="setSearchFilter('all', this)">
                        <i class="fas fa-th-large"></i> Tất cả
                    </button>
                    <button class="filter-btn" onclick="setSearchFilter('giang_vien', this)">
                        <i class="fas fa-user-tie"></i> Giảng viên
                    </button>
                    <button class="filter-btn" onclick="setSearchFilter('cong_trinh', this)">
                        <i class="fas fa-file-alt"></i> Công trình
                    </button>
                    <button class="filter-btn" onclick="setSearchFilter('de_tai', this)">
                        <i class="fas fa-flask"></i> Đề tài
                    </button>
                </div>

                <div class="search-suggestions" id="searchSuggestionsContainer">
                    <span class="suggestion-label">Gợi ý:</span>
                    <span id="dynamicSuggestions" style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;"></span>
                    <button onclick="renderRandomSuggestions()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; margin-left:5px; transition:var(--transition);" onmouseover="this.style.color='var(--accent-blue)'; this.style.transform='rotate(180deg)';" onmouseout="this.style.color='var(--text-muted)'; this.style.transform='rotate(0deg)';" title="Đổi gợi ý khác">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <div class="explore-content">
                <div id="searchResults" class="search-results" style="display: none;">
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-list"></i> Kết quả tìm kiếm</h2>
                        </div>
                        <div class="card-body" id="searchResultsList"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-placeholder"></div>

    <script src="../js/user/layout.js"></script>
    <script src="../js/user/config.js"></script>
    <script src="../js/user/graph.js"></script>
    <script src="../js/user/scholar.js"></script>
    <script src="../js/user/translation.js"></script>
    <script src="../js/user/auth.js"></script>
    <script src="../js/user/dashboard.js"></script>
    <script src="../js/user/explore.js"></script>
    <script src="../js/user/lecturers.js"></script>
    <script src="../js/user/publications.js"></script>
    <script src="../js/user/projects.js"></script>
    <script src="../js/user/statistics.js"></script>
    <script src="../js/user/main.js"></script>
</body>
</html>
