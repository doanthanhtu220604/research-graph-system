<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bản đồ tri thức nghiên cứu khoa học - Khoa CNTT, Trường Đại học Nha Trang">
    <title>Công trình - Knowledge Map | ĐH Nha Trang</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-content" id="mainContent">
        <div class="page-header">
            <h1 class="page-title">Công trình Nghiên cứu</h1>
        </div>

        <section class="page active" id="page-publications" style="display: block;">
            <div class="card">
                <div class="data-toolbar">
                    <div class="toolbar-search">
                        <i class="fas fa-search"></i>
                        <input type="text" id="pubSearchInput" placeholder="Tìm tên công trình..." oninput="filterUserPublications()">
                    </div>
                    <select class="toolbar-select" id="pubYearFilter" onchange="filterUserPublications()">
                        <option value="">Tất cả năm</option>
                    </select>
                    <select class="toolbar-select" id="pubTypeFilter" onchange="filterUserPublications()">
                        <option value="">Tất cả loại</option>
                        <option value="Bài báo khoa học">Bài báo khoa học</option>
                        <option value="Sách và chương sách">Sách & chương sách</option>
                        <option value="Hội nghị / Hội thảo quốc tế">Hội nghị quốc tế</option>
                        <option value="Hội nghị / Hội thảo trong nước">Hội nghị trong nước</option>
                        <option value="Báo cáo khoa học">Báo cáo khoa học</option>
                    </select>
                    <span class="toolbar-count" id="pubCount"></span>
                </div>
                <div id="publicationsList" class="data-row-list">
                    <div class="list-loading">
                        <i class="fas fa-spinner fa-spin fa-2x"></i>
                        <span>Đang tải công trình nghiên cứu...</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-placeholder"></div>

    <script src="../js/user/layout.js"></script>
    <script src="../js/user/app.js"></script>
</body>
</html>
